sonar.projectKey=milena-cicd-backend-project

# Source code
sonar.sources=src
sonar.tests=src/__tests__
sonar.exclusions=src/__tests__/**,**/*.config.ts

# TypeScript / coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/server.ts,src/lib/prisma.ts,src/__tests__/**,**/*.config.ts

sonar.sourceEncoding=UTF-8